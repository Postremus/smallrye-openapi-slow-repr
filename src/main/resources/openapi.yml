          },
          "parentApplicationId" : {
            "type" : "integer",
            "format" : "int64",
            "description" : "The direct parent application of this application. Applications which have a parent are called a child. Only parent-child is allowed, not grandparent, parent, child or any further ancestry."
          },
          "image" : {
            "type" : "string",
            "deprecated" : true,
            "description" : "Image of this application, used in portal as header when displaying a list of applications. This is a base64 encoded byte array."
