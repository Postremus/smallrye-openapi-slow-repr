      },
      "AdapterTenantGrantSetting" : {
        "type" : "string",
        "enum" : [ "ENABLED_FOR_ALL_ORGANIZATIONS", "DISABLED_FOR_ALL_ORGANIZATIONS", "ENABLED_FOR_SELECTED_ORGANIZATIONS" ]
      },
      "AdapterTenantOrganizationGrantData" : {
        "type" : "object",
